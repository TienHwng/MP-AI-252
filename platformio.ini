; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; --- COMMON SETTINGS ---
; Shared settings for all environments
[common]
workspace_dir = ${PROJECT_DIR}/firmware

; --- Project Documentation ---
; This describes the project purpose. It does not affect the build.

; --- DIRECTORY MAPPING ---
; Since platformio.ini is at the root, we must point to the 'firmware' folder.
; 1. Path to source code (.cpp files)
; 2. Path to header files (.h files)
; 3. Path to custom libraries
; 4. Path to custom board definitions (Essential for Yolo Uno)
; 5. Path to data for FileSystem Upload
; 6. Path to unit tests

[platformio]
description = AIoT Assistant Project Configuration (Monorepo Structure)
default_envs = yolo_uno

src_dir = ${common.workspace_dir}/src
include_dir = ${common.workspace_dir}/include
lib_dir = ${common.workspace_dir}/lib
boards_dir = ${common.workspace_dir}/boards
data_dir = ${common.workspace_dir}/data
test_dir = ${common.workspace_dir}/test

[env:yolo_uno]
platform = espressif32
board = yolo_uno
framework = arduino
monitor_speed = 115200

board_build.filesystem = littlefs

build_flags = 
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1
	-D SSID_AP='ESP32 - TienHwng'
	-D PASS_AP='12345678'
	-D ELEGANTOTA_USE_ASYNC_WEBSERVER=1

lib_deps = 
	; The exact version
    ; robtillaart/DHT20 @ 0.3.1
	bblanchon/ArduinoJson @ ^7.0.4
	tanakamasayuki/TensorFlowLite_ESP32@1.0.0
	adafruit/Adafruit NeoPixel@^1.15.1
	DHT20
	LCD
	PubSubClient
	https://github.com/me-no-dev/ESPAsyncWebServer.git
	witnessmenow/UniversalTelegramBot@^1.3.0
	z3t0/IRremote@^4.6.0

lib_compat_mode = strict
